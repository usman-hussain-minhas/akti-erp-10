name: akti-erp-phase4a-local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: akti_phase4a_local
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_USER: akti_local
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akti_local -d akti_phase4a_local"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - phase4a-postgres-data:/var/lib/postgresql/data

volumes:
  phase4a-postgres-data:
