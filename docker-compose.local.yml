name: esbla-spark-local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: esbla_phase4a_local
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_USER: esbla_local
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esbla_local -d esbla_phase4a_local"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - esbla-postgres-data:/var/lib/postgresql/data

volumes:
  esbla-postgres-data:
