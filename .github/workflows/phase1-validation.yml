# Historical filename retained for existing validation references; display and job names
# now reflect the active Phase 3 security/auth/tenant validation gate.
name: Phase 3 Security Validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: phase3-security-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  phase3-security-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Check lower_snake_case paths
        run: node scripts/quality/check_lower_snake_case_paths.mjs

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.12.1

      - name: pnpm install --frozen-lockfile
        run: pnpm install --frozen-lockfile

      - name: pnpm contracts:validate (includes module manifest validation)
        run: pnpm contracts:validate

      - name: pnpm exec prisma validate --schema prisma/schema.prisma
        run: pnpm exec prisma validate --schema prisma/schema.prisma

      - name: pnpm exec prisma generate --schema prisma/schema.prisma
        run: pnpm exec prisma generate --schema prisma/schema.prisma

      - name: pnpm registry:generate
        run: pnpm registry:generate

      - name: Verify generated registry has no drift
        run: git diff --exit-code -- generated/entity-registry.generated.json

      - name: pnpm registry:check
        run: pnpm registry:check

      - name: pnpm registry:verify:phase2
        run: pnpm registry:verify:phase2

      - name: pnpm lint
        run: pnpm lint

      - name: pnpm typecheck
        run: pnpm typecheck

      - name: pnpm test
        run: pnpm test

      - name: pnpm build
        run: pnpm build

      - name: Verify diff hygiene
        run: git diff --check

      - name: Verify prisma/schema.prisma unchanged
        run: git diff --exit-code -- prisma/schema.prisma

      - name: Verify prisma/entity-registry.metadata.json unchanged
        run: git diff --exit-code -- prisma/entity-registry.metadata.json

      - name: Verify clean git status
        shell: bash
        run: |
          set -euo pipefail
          git status --short
          if [[ -n "$(git status --short)" ]]; then
            echo "FAIL: git status is not clean after validation steps"
            exit 1
          fi
